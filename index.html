<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Route-Master V8 (Sicherheits-Edition)</title>
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --danger: #ef4444;
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0;
        }

        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --primary: #3b82f6;
        }

        body { font-family: -apple-system, system-ui, sans-serif; padding: env(safe-area-inset-top) 15px 40px 15px; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; }
        textarea { width: 100%; height: 100px; border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        
        .controls { display: flex; gap: 8px; align-items: center; margin: 15px 0; flex-wrap: wrap; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); flex-grow: 1; }

        button { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sec { background: var(--secondary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; padding: 18px; margin-top: 20px; font-size: 1.1rem; }
        .btn-danger { background: var(--danger); color: white; }
        
        /* LISTEN-LAYOUT */
        .route-block { border: 1px solid var(--border); border-radius: 14px; margin-top: 15px; background: var(--card); overflow: hidden; }
        .route-header { background: var(--border); padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        .segment-row { border-bottom: 1px solid var(--border); }
        .segment-main { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; cursor: pointer; gap: 8px; flex-wrap: nowrap; 
        }
        
        .segment-info { display: flex; align-items: center; gap: 8px; flex-shrink: 1; overflow: hidden; }
        .segment-actions { display: flex; gap: 5px; flex-shrink: 0; }

        .segment-details { display: none; background: var(--bg); padding: 10px; border-top: 1px inset var(--border); }
        
        .stop-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5px; border-bottom: 1px solid var(--border); font-size: 0.85rem;
        }

        .counter-badge { background: var(--primary); color: white; border-radius: 6px; padding: 3px 8px; font-weight: bold; font-size: 0.8rem; }
        
        @media (max-width: 400px) {
            .btn-mini-text { display: none; } /* Versteckt Text auf kleinen Handys, zeigt nur Icon/Button */
        }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <h1 id="titleHeader">🛠 ROUTE-MASTER V8</h1>

    <div class="card">
        <h3>1. Projekt laden</h3>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            <button class="btn-sec" onclick="loadProjectFile()">Einlesen</button>
            <button class="btn-danger" onclick="safeReset()">Reset</button>
        </div>
    </div>

    <div class="card">
        <h3>2. ITN Import</h3>
        <textarea id="itnInput" placeholder="ITN Daten hier einfügen..."></textarea>
        <div class="controls">
            <input type="text" id="mainRouteName" placeholder="Name">
            <input type="text" id="routePrefix" placeholder="ID" style="width: 50px;">
            <button class="btn-primary" onclick="importITN()">Hinzufügen</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Editor</h3>
        <div id="editorArea"></div>
        <button class="btn-save" id="saveBtn" style="display:none;" onclick="downloadJSON()">💾 GESAMT-JSON SPEICHERN</button>
    </div>
</div>

<script>
    let projectData = { touren: [] };

    // Automatische Zeit-Anpassung
    function updateTheme() {
        const hour = new Date().getHours();
        if (hour >= 20 || hour < 7) { 
            document.getElementById('mainBody').classList.add('dark-mode');
            document.getElementById('titleHeader').innerText = "🌙 ROUTE-MASTER V8";
        }
    }

    function loadProjectFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { 
            projectData = JSON.parse(e.target.result); 
            renderEditor(); 
        };
        reader.readAsText(file);
    }

    function importITN() {
        const input = document.getElementById('itnInput').value.trim();
        const name = document.getElementById('mainRouteName').value || "Neue Route";
        const prefix = document.getElementById('routePrefix').value || "00";
        if(!input) return;

        const lines = input.split(/\r?\n/).filter(l => l.trim() !== "");
        let points = [];
        lines.forEach(line => {
            const parts = line.split('|');
            if(parts.length >= 3) {
                points.push({ lat: parseFloat(parts[1])/100000, lng: parseFloat(parts[0])/100000, name: parts[2].trim() });
            }
        });

        let tour = projectData.touren.find(t => t.id === prefix);
        if (!tour) { tour = { name: name, id: prefix, abschnitte: [] }; projectData.touren.push(tour); }

        let startCount = tour.abschnitte.length;
        for (let i = 0; i < points.length; i += 10) {
            let chunk = points.slice(i, i + 10);
            let label = prefix + "-" + String(startCount + Math.floor(i/10) + 1).padStart(2, '0');
            tour.abschnitte.push({ bezeichnung: label, stopps: chunk });
        }
        renderEditor();
    }

    function renderEditor() {
        const area = document.getElementById('editorArea');
        area.innerHTML = "";
        if(projectData.touren.length > 0) document.getElementById('saveBtn').style.display = "block";

        projectData.touren.forEach((tour, tIdx) => {
            let tourDiv = document.createElement('div');
            tourDiv.className = 'route-block';
            tourDiv.innerHTML = `
                <div class="route-header">
                    <span>Route ${tour.id}: ${tour.name}</span>
                    <button class="btn-danger" style="padding:5px 10px; font-size:0.7rem;" onclick="safeDeleteTour(${tIdx})">Tour löschen</button>
                </div>`;
            
            tour.abschnitte.forEach((abs, aIdx) => {
                let segDiv = document.createElement('div');
                segDiv.className = 'segment-row';
                
                let stopsHtml = abs.stopps.map((s, sIdx) => `
                    <div class="stop-item">
                        <span>${sIdx+1}. ${s.name}</span>
                        <button class="btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="safeDeleteStop(${tIdx}, ${aIdx}, ${sIdx}); event.stopPropagation();">Löschen</button>
                    </div>
                `).join('');

                segDiv.innerHTML = `
                    <div class="segment-main" onclick="toggleDetails(${tIdx}, ${aIdx})">
                        <div class="segment-info">
                            <div class="counter-badge">${abs.bezeichnung}</div>
                            <div style="font-size:0.85rem;">${abs.stopps.length} Stopps</div>
                        </div>
                        <div class="segment-actions">
                            <button class="btn-primary" style="padding:6px 10px; font-size:0.7rem;" onclick="openInMaps(${tIdx}, ${aIdx}); event.stopPropagation();">📍 Maps</button>
                            <button class="btn-danger" style="padding:6px 10px; font-size:0.7rem;" onclick="safeDeleteSegment(${tIdx}, ${aIdx}); event.stopPropagation();">Löschen</button>
                        </div>
                    </div>
                    <div class="segment-details" id="details-${tIdx}-${aIdx}">${stopsHtml}</div>
                `;
                tourDiv.appendChild(segDiv);
            });
            area.appendChild(tourDiv);
        });
    }

    function toggleDetails(tIdx, aIdx) {
        const el = document.getElementById(`details-${tIdx}-${aIdx}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function openInMaps(tIdx, aIdx) {
        const points = projectData.touren[tIdx].abschnitte[aIdx].stopps;
        const dest = `${points[points.length-1].lat},${points[points.length-1].lng}`;
        const ways = points.slice(0, -1).map(p => `${p.lat},${p.lng}`).join('|');
        window.open(`comgooglemaps://?saddr=&daddr=${dest}&waypoints=${ways}&directionsmode=driving`, '_blank');
    }

    // SICHERHEITS-LÖSCHFUNKTIONEN
    function safeDeleteStop(tIdx, aIdx, sIdx) {
        if(confirm("Diesen Stopp wirklich löschen?")) {
            projectData.touren[tIdx].abschnitte[aIdx].stopps.splice(sIdx, 1);
            renderEditor();
            document.getElementById(`details-${tIdx}-${aIdx}`).style.display = 'block';
        }
    }

    function safeDeleteSegment(tIdx, aIdx) {
        if(confirm("Diesen kompletten Abschnitt löschen?")) {
            projectData.touren[tIdx].abschnitte.splice(aIdx, 1);
            renderEditor();
        }
    }

    function safeDeleteTour(tIdx) {
        if(confirm("Die gesamte Tour mit allen Abschnitten löschen?")) {
            projectData.touren.splice(tIdx, 1);
            renderEditor();
        }
    }

    function safeReset() {
        if(confirm("ACHTUNG: Möchtest du wirklich alle aktuell geladenen Daten im Editor löschen? (Deine gespeicherte JSON-Datei bleibt erhalten)")) {
            projectData = { touren: [] };
            renderEditor();
        }
    }

    function downloadJSON() {
        const dataStr = JSON.stringify(projectData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "beleuchtungskontrolle_export.json";
        a.click();
    }

    window.onload = updateTheme;
</script>
</body>
</html>
