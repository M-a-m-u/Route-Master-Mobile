<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Route-Master V4: Inhalts-Check & Maps-Vorschau</title>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; background: var(--bg); color: #1e293b; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .status-bar { background: #dcfce7; color: #166534; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; display: none; }
        h1 { color: var(--primary); margin-top: 0; }
        textarea { width: 100%; height: 100px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; font-family: monospace; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; align-items: center; margin: 15px 0; flex-wrap: wrap; }
        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sec { background: var(--secondary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 1.1rem; margin-top: 10px; padding: 15px; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-mini { padding: 3px 6px; font-size: 0.7rem; }
        
        /* Routen & Abschnitte */
        .route-block { border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 20px; background: white; overflow: hidden; }
        .route-header { background: #f8fafc; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .segment-row { border-bottom: 1px solid #f1f5f9; background: #fff; }
        .segment-main { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; }
        .segment-main:hover { background: #f8fafc; }
        .segment-details { display: none; background: #fdfdfd; padding: 10px 10px 10px 50px; border-top: 1px inset #f1f5f9; }
        .stop-item { font-size: 0.85rem; display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #eee; }
        .counter-badge { background: var(--primary); color: white; border-radius: 4px; padding: 2px 8px; font-size: 0.85rem; min-width: 60px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠 Route-Master V4</h1>
    
    <div id="saveStatus" class="status-bar"></div>

    <div class="card">
        <h3>1. Projekt / Backup laden</h3>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            <button class="btn-sec" onclick="loadProjectFile()">JSON einlesen</button>
            <button class="btn-danger" onclick="clearLocalStorage()" style="margin-left: auto;">Reset (Alles löschen)</button>
        </div>
    </div>

    <div class="card">
        <h3>2. ITN Import</h3>
        <textarea id="itnInput" placeholder="Kopiere ITN-Daten hier rein..."></textarea>
        <div class="controls">
            <input type="text" id="mainRouteName" placeholder="Name (z.B. Derendorf)">
            <input type="text" id="routePrefix" placeholder="ID (z.B. 03)" style="width: 60px;">
            <button class="btn-primary" onclick="importITN()">Hinzufügen</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Editor & Kontrolle</h3>
        <p><small>Klicke auf einen Abschnitt, um die Stopps zu sehen.</small></p>
        <div id="editorArea"></div>
        <button class="btn-save" id="saveBtn" style="display:none;" onclick="downloadJSON()">Gesamt-JSON speichern</button>
    </div>
</div>

<script>
    let projectData = { touren: [] };
    const STORAGE_KEY = 'route_master_v4_data';

    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            projectData = JSON.parse(saved);
            renderEditor();
        }
    };

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projectData));
        showStatus("Gespeichert um " + new Date().toLocaleTimeString());
    }

    function showStatus(msg) {
        const s = document.getElementById('saveStatus');
        s.innerText = msg; s.style.display = 'block';
        setTimeout(() => { s.style.display = 'none'; }, 2000);
    }

    function importITN() {
        const input = document.getElementById('itnInput').value.trim();
        const name = document.getElementById('mainRouteName').value || "Neue Route";
        const prefix = document.getElementById('routePrefix').value || "00";
        if(!input) return;

        const lines = input.split(/\r?\n/).filter(l => l.trim() !== "");
        let points = [];
        lines.forEach(line => {
            const parts = line.split('|');
            if(parts.length >= 3) {
                points.push({ 
                    lat: parseFloat(parts[1]) / 100000, 
                    lng: parseFloat(parts[0]) / 100000, 
                    name: parts[2].trim() 
                });
            }
        });

        let tour = projectData.touren.find(t => t.id === prefix);
        if (!tour) { tour = { name: name, id: prefix, abschnitte: [] }; projectData.touren.push(tour); }

        let startCount = tour.abschnitte.length;
        for (let i = 0; i < points.length; i += 10) {
            let chunk = points.slice(i, i + 10);
            let sectionLabel = prefix + " - " + String(startCount + Math.floor(i/10) + 1).padStart(2, '0');
            tour.abschnitte.push({ bezeichnung: sectionLabel, stopps: chunk });
        }

        document.getElementById('itnInput').value = "";
        saveToLocalStorage();
        renderEditor();
    }

    function renderEditor() {
        const area = document.getElementById('editorArea');
        const saveBtn = document.getElementById('saveBtn');
        area.innerHTML = "";
        if(projectData.touren.length > 0) saveBtn.style.display = "block";

        projectData.touren.sort((a,b) => a.id.localeCompare(b.id)).forEach((tour, tIdx) => {
            let tourDiv = document.createElement('div');
            tourDiv.className = 'route-block';
            tourDiv.innerHTML = `<div class="route-header"><span>Route ${tour.id}: ${tour.name}</span><button class="btn-danger btn-mini" onclick="deleteTour(${tIdx})">Löschen</button></div>`;
            
            tour.abschnitte.forEach((abs, aIdx) => {
                let segDiv = document.createElement('div');
                segDiv.className = 'segment-row';
                
                // HTML für die Stopp-Liste generieren
                let stopsHtml = abs.stopps.map((s, sIdx) => `
                    <div class="stop-item">
                        <span>${sIdx+1}. ${s.name} <small>(${s.lat.toFixed(5)}, ${s.lng.toFixed(5)})</small></span>
                        <button class="btn-danger btn-mini" onclick="deleteStop(${tIdx}, ${aIdx}, ${sIdx}); event.stopPropagation();">X</button>
                    </div>
                `).join('');

                segDiv.innerHTML = `
                    <div class="segment-main" onclick="toggleDetails(${tIdx}, ${aIdx})">
                        <div class="counter-badge">${abs.bezeichnung}</div>
                        <div style="flex-grow:1">${abs.stopps.length} Stopps</div>
                        <button class="btn-primary btn-mini" onclick="openInMaps(${tIdx}, ${aIdx}); event.stopPropagation();">📍 Maps Check</button>
                        <button class="btn-danger btn-mini" onclick="deleteSegment(${tIdx}, ${aIdx}); event.stopPropagation();">Löschen</button>
                    </div>
                    <div class="segment-details" id="details-${tIdx}-${aIdx}">
                        ${stopsHtml}
                    </div>
                `;
                tourDiv.appendChild(segDiv);
            });
            area.appendChild(tourDiv);
        });
    }

    function toggleDetails(tIdx, aIdx) {
        const el = document.getElementById(`details-${tIdx}-${aIdx}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function openInMaps(tIdx, aIdx) {
        const points = projectData.touren[tIdx].abschnitte[aIdx].stopps;
        const origin = "My+Location";
        const dest = `${points[points.length-1].lat},${points[points.length-1].lng}`;
        const ways = points.slice(0, -1).map(p => `${p.lat},${p.lng}`).join('|');
        window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${ways}&travelmode=driving`, '_blank');
    }

    function deleteStop(tIdx, aIdx, sIdx) {
        projectData.touren[tIdx].abschnitte[aIdx].stopps.splice(sIdx, 1);
        saveToLocalStorage(); renderEditor();
        // Damit das Menü offen bleibt:
        document.getElementById(`details-${tIdx}-${aIdx}`).style.display = 'block';
    }

    function deleteTour(tIdx) { if(confirm("Ganze Route löschen?")) { projectData.touren.splice(tIdx, 1); saveToLocalStorage(); renderEditor(); } }
    function deleteSegment(tIdx, aIdx) { projectData.touren[tIdx].abschnitte.splice(aIdx, 1); saveToLocalStorage(); renderEditor(); }
    function clearLocalStorage() { if(confirm("Alles löschen?")) { localStorage.clear(); projectData = {touren:[]}; renderEditor(); } }
    function loadProjectFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { projectData = JSON.parse(e.target.result); saveToLocalStorage(); renderEditor(); };
        reader.readAsText(file);
    }
    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData, null, 2));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "beleuchtungskontrolle_master.json");
        dl.click();
    }
</script>
</body>
</html>
