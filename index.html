<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Route-Master V7</title>
    <link rel="apple-touch-icon" href="icon.png">

    <style id="theme-style">
        /* Standard-Variablen (werden per JS überschrieben) */
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        /* Nacht-Modus CSS Klassen (werden per JS aktiviert) */
        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --primary: #3b82f6;
            --secondary: #475569;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: env(safe-area-inset-top) 15px 40px 15px; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            transition: background 0.5s, color 0.5s;
        }

        .container { max-width: 1000px; margin: 0 auto; }
        .card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border: 1px solid var(--border); 
        }

        .status-bar { 
            background: #dcfce7; color: #166534; 
            padding: 12px; border-radius: 10px; margin-bottom: 15px; 
            font-size: 0.9rem; display: none; text-align: center;
        }
        body.dark-mode .status-bar { background: #064e3b; color: #ecfdf5; }

        h1 { color: var(--primary); margin: 20px 0; text-align: center; font-size: 1.6rem; }
        h3 { margin-top: 0; font-size: 1rem; color: var(--primary); }

        textarea { 
            width: 100%; height: 120px; border: 1px solid var(--border); 
            border-radius: 10px; padding: 12px; font-family: monospace; 
            box-sizing: border-box; background: var(--bg); color: var(--text);
        }

        .controls { display: flex; gap: 10px; align-items: center; margin: 15px 0; flex-wrap: wrap; }
        input { 
            padding: 12px; border: 1px solid var(--border); border-radius: 10px; 
            background: var(--bg); color: var(--text); flex-grow: 1;
        }

        button { padding: 12px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sec { background: var(--secondary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 1.1rem; margin-top: 10px; padding: 18px; border-radius: 14px; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-mini { padding: 6px 10px; font-size: 0.75rem; border-radius: 6px; }
        
        .route-block { border: 1px solid var(--border); border-radius: 14px; margin-top: 20px; background: var(--card); overflow: hidden; }
        .route-header { background: var(--border); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; opacity: 0.9; }
        
        .segment-row { border-bottom: 1px solid var(--border); }
        .segment-main { display: flex; align-items: center; gap: 10px; padding: 15px; cursor: pointer; flex-wrap: wrap; }
        .segment-main:hover { background: var(--border); opacity: 0.8; }
        
        .segment-details { display: none; background: var(--bg); padding: 10px 15px; border-top: 1px inset var(--border); }
        .stop-item { font-size: 0.85rem; display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
        
        .counter-badge { background: var(--primary); color: white; border-radius: 6px; padding: 4px 10px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <h1 id="titleHeader">🛠 ROUTE-MASTER V7</h1>
    <div id="saveStatus" class="status-bar"></div>

    <div class="card">
        <h3>1. Projekt / Backup laden</h3>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            <button class="btn-sec" onclick="loadProjectFile()">JSON einlesen</button>
            <button class="btn-danger" onclick="clearLocalStorage()">Reset</button>
        </div>
    </div>

    <div class="card">
        <h3>2. ITN Import</h3>
        <textarea id="itnInput" placeholder="ITN-Daten einfügen..."></textarea>
        <div class="controls">
            <input type="text" id="mainRouteName" placeholder="Name">
            <input type="text" id="routePrefix" placeholder="ID" style="width: 50px;">
            <button class="btn-primary" onclick="importITN()">Hinzufügen</button>
        </div>
    </div>

    <div class="card">
        <h3>3. Editor & Kontrolle</h3>
        <div id="editorArea"></div>
        <button class="btn-save" id="saveBtn" style="display:none;" onclick="downloadJSON()">Gesamt-JSON speichern</button>
    </div>
</div>

<script>
    // --- ZEIT-STEUERUNG ---
    function updateTheme() {
        const hour = new Date().getHours();
        const body = document.getElementById('mainBody');
        const header = document.getElementById('titleHeader');
        
        // Nachtmodus zwischen 18:00 und 07:00
        if (hour >= 20 || hour < 7) {
            body.classList.add('dark-mode');
            header.innerText = "🌙 ROUTE-MASTER V7 (Nacht)";
        } else {
            body.classList.remove('dark-mode');
            header.innerText = "☀️ ROUTE-MASTER V7 (Tag)";
        }
    }

    // --- DEINE ORIGINAL-LOGIK ---
    let projectData = { touren: [] };
    const STORAGE_KEY = 'route_master_v4_data';

    window.onload = () => {
        updateTheme(); // Zeit-Check beim Laden
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            projectData = JSON.parse(saved);
            renderEditor();
        }
    };

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projectData));
        showStatus("Gespeichert um " + new Date().toLocaleTimeString());
    }

    function showStatus(msg) {
        const s = document.getElementById('saveStatus');
        s.innerText = msg; s.style.display = 'block';
        setTimeout(() => { s.style.display = 'none'; }, 2000);
    }

    function importITN() {
        const input = document.getElementById('itnInput').value.trim();
        const name = document.getElementById('mainRouteName').value || "Neue Route";
        const prefix = document.getElementById('routePrefix').value || "00";
        if(!input) return;

        const lines = input.split(/\r?\n/).filter(l => l.trim() !== "");
        let points = [];
        lines.forEach(line => {
            const parts = line.split('|');
            if(parts.length >= 3) {
                points.push({ 
                    lat: parseFloat(parts[1]) / 100000, 
                    lng: parseFloat(parts[0]) / 100000, 
                    name: parts[2].trim() 
                });
            }
        });

        let tour = projectData.touren.find(t => t.id === prefix);
        if (!tour) { tour = { name: name, id: prefix, abschnitte: [] }; projectData.touren.push(tour); }

        let startCount = tour.abschnitte.length;
        for (let i = 0; i < points.length; i += 10) {
            let chunk = points.slice(i, i + 10);
            let sectionLabel = prefix + " - " + String(startCount + Math.floor(i/10) + 1).padStart(2, '0');
            tour.abschnitte.push({ bezeichnung: sectionLabel, stopps: chunk });
        }
        document.getElementById('itnInput').value = "";
        saveToLocalStorage();
        renderEditor();
    }

    function renderEditor() {
        const area = document.getElementById('editorArea');
        const saveBtn = document.getElementById('saveBtn');
        area.innerHTML = "";
        if(projectData.touren.length > 0) saveBtn.style.display = "block";

        projectData.touren.sort((a,b) => a.id.localeCompare(b.id)).forEach((tour, tIdx) => {
            let tourDiv = document.createElement('div');
            tourDiv.className = 'route-block';
            tourDiv.innerHTML = `<div class="route-header"><span>Route ${tour.id}: ${tour.name}</span><button class="btn-danger btn-mini" onclick="deleteTour(${tIdx})">Löschen</button></div>`;
            
            tour.abschnitte.forEach((abs, aIdx) => {
                let segDiv = document.createElement('div');
                segDiv.className = 'segment-row';
                let stopsHtml = abs.stopps.map((s, sIdx) => `
                    <div class="stop-item">
                        <span>${sIdx+1}. ${s.name} <br><small>${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</small></span>
                        <button class="btn-danger btn-mini" onclick="deleteStop(${tIdx}, ${aIdx}, ${sIdx}); event.stopPropagation();">X</button>
                    </div>
                `).join('');

                segDiv.innerHTML = `
                    <div class="segment-main" onclick="toggleDetails(${tIdx}, ${aIdx})">
                        <div class="counter-badge">${abs.bezeichnung}</div>
                        <div style="flex-grow:1; font-weight:bold;">${abs.stopps.length} Stopps</div>
                        <button class="btn-primary btn-mini" onclick="openInMaps(${tIdx}, ${aIdx}); event.stopPropagation();">📍 Maps</button>
                        <button class="btn-danger btn-mini" onclick="deleteSegment(${tIdx}, ${aIdx}); event.stopPropagation();">Löschen</button>
                    </div>
                    <div class="segment-details" id="details-${tIdx}-${aIdx}">
                        ${stopsHtml}
                    </div>
                `;
                tourDiv.appendChild(segDiv);
            });
            area.appendChild(tourDiv);
        });
    }

    function toggleDetails(tIdx, aIdx) {
        const el = document.getElementById(`details-${tIdx}-${aIdx}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function openInMaps(tIdx, aIdx) {
        const points = projectData.touren[tIdx].abschnitte[aIdx].stopps;
        const dest = `${points[points.length-1].lat},${points[points.length-1].lng}`;
        const ways = points.slice(0, -1).map(p => `${p.lat},${p.lng}`).join('|');
        window.open(`comgooglemaps://?saddr=&daddr=${dest}&waypoints=${ways}&directionsmode=driving`, '_blank');
    }

    function deleteStop(tIdx, aIdx, sIdx) {
        projectData.touren[tIdx].abschnitte[aIdx].stopps.splice(sIdx, 1);
        saveToLocalStorage(); renderEditor();
        document.getElementById(`details-${tIdx}-${aIdx}`).style.display = 'block';
    }

    function deleteTour(tIdx) { if(confirm("Löschen?")) { projectData.touren.splice(tIdx, 1); saveToLocalStorage(); renderEditor(); } }
    function deleteSegment(tIdx, aIdx) { projectData.touren[tIdx].abschnitte.splice(aIdx, 1); saveToLocalStorage(); renderEditor(); }
    function clearLocalStorage() { if(confirm("Alles löschen?")) { localStorage.clear(); projectData={touren:[]}; renderEditor(); } }
    
    function loadProjectFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { projectData = JSON.parse(e.target.result); saveToLocalStorage(); renderEditor(); };
        reader.readAsText(file);
    }
    
    function downloadJSON() {
        const data = JSON.stringify(projectData, null, 2);
        const blob = new Blob([data], {type: "application/json"});
        const dl = document.createElement('a');
        dl.href = URL.createObjectURL(blob);
        dl.download = "beleuchtungskontrolle_master.json";
        dl.click();
    }
</script>
</body>
</html>
