<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route-Master V14.2 (Real-Road)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --primary: #3b82f6; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-top: 0; }
        .controls { display: flex; gap: 10px; align-items: center; margin: 15px 0; flex-wrap: wrap; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); }
        button { padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; }
        .route-block { border: 1px solid var(--border); border-radius: 14px; margin-top: 15px; background: var(--card); overflow: hidden; }
        .route-header { background: var(--border); padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .segment-row { border-bottom: 1px solid var(--border); transition: background 0.2s; }
        .segment-main { padding: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .segment-main:hover { background: rgba(0,0,0,0.05); }
        .segment-details { display: none; background: var(--bg); padding: 10px; border-top: 1px inset var(--border); }
        .stop-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .counter-badge { background: var(--primary); color: white; border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; min-width: 55px; text-align: center; }
        #mapModal { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 90%; background: var(--card); z-index: 10000; border-radius: 20px; border: 2px solid var(--primary); }
        #mapContainer { width: 100%; height: calc(100% - 60px); }
        .modal-header { padding: 15px; display: flex; justify-content: space-between; background: var(--primary); color: white; border-radius: 18px 18px 0 0; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; }
    </style>
</head>
<body id="mainBody">

<div id="modalOverlay" onclick="closeMap()"></div>
<div id="mapModal">
    <div class="modal-header"><span id="modalTitle">Vorschau</span><button onclick="closeMap()" style="background:white; color:black; padding:5px;">X</button></div>
    <div id="mapContainer"></div>
</div>

<div class="container">
    <h1>🛠 ROUTE-MASTER V14.2 (REAL-ROAD)</h1>
    <div class="card">
        <h3>1. Projekt & ITN Import</h3>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json,.itn">
            <button class="btn-primary" onclick="handleFileSelect()">Datei einlesen</button>
            <button class="btn-danger" onclick="safeReset()">Reset</button>
        </div>
        <div id="itnSettings" style="display:none; border-top:1px solid var(--border); margin-top:10px; padding-top:10px;">
            <div class="controls">
                <input type="text" id="mainRouteName" placeholder="Routen-Name">
                <input type="text" id="routePrefix" placeholder="ID" style="width: 60px;">
                <select id="splitCount">
                    <option value="999">Alles ein Abschnitt</option>
                    <option value="10">Split alle 10</option>
                    <option value="25">Split alle 25</option>
                    <option value="50">Split alle 50</option>
                </select>
                <button class="btn-primary" style="background:#22c55e;" onclick="processITNData()">Importieren</button>
            </div>
        </div>
    </div>
    <div class="card">
        <div id="editorArea"></div>
        <button class="btn-save" id="saveBtn" style="display:none;" onclick="prepareAndDownload()">💾 MASTER-JSON (OFFLINE) SPEICHERN</button>
        <p id="statusMsg" style="text-align:center; font-weight:bold; color:var(--primary);"></p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let projectData = { touren: [] };
    let previewMap;
    let pendingITN = null;

    function handleFileSelect() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            if (file.name.endsWith('.json')) { projectData = JSON.parse(e.target.result); renderEditor(); }
            else { pendingITN = e.target.result; document.getElementById('itnSettings').style.display = 'block'; document.getElementById('mainRouteName').value = file.name.replace('.itn',''); }
        };
        reader.readAsText(file);
    }

    function processITNData() {
        const name = document.getElementById('mainRouteName').value || "Tour";
        const prefix = document.getElementById('routePrefix').value || "00";
        const split = parseInt(document.getElementById('splitCount').value);
        const lines = pendingITN.split(/\r?\n/).filter(l => l.includes('|'));
        let pts = lines.map(l => { const p = l.split('|'); return { lat: parseFloat(p[1])/100000, lng: parseFloat(p[0])/100000, name: p[2].trim() }; });
        let tour = projectData.touren.find(t => t.id === prefix) || { name: name, id: prefix, abschnitte: [] };
        if (!projectData.touren.includes(tour)) projectData.touren.push(tour);

        for (let i = 0; i < pts.length; i += split) {
            let chunk = pts.slice(i, i + split);
            if (i > 0) chunk.unshift(pts[i-1]);
            else if (tour.abschnitte.length > 0) chunk.unshift(tour.abschnitte[tour.abschnitte.length-1].stopps.slice(-1)[0]);
            tour.abschnitte.push({ bezeichnung: "", stopps: chunk, geometry: null });
        }
        reindexSegments(tour); renderEditor(); document.getElementById('itnSettings').style.display = 'none';
    }

    function reindexSegments(tour) { tour.abschnitte.forEach((abs, i) => abs.bezeichnung = tour.id + "-" + String(i + 1).padStart(2, '0')); }

    function renderEditor() {
        const area = document.getElementById('editorArea'); area.innerHTML = "";
        if(projectData.touren.length > 0) document.getElementById('saveBtn').style.display = "block";
        projectData.touren.forEach((t, tIdx) => {
            let div = document.createElement('div'); div.className = 'route-block';
            div.innerHTML = `<div class="route-header"><span>Route ${t.id}: ${t.name}</span><button class="btn-danger" onclick="deleteTour(${tIdx})">X</button></div><div id="segs-${tIdx}"></div>`;
            t.abschnitte.forEach((abs, aIdx) => {
                let sRow = document.createElement('div'); sRow.className = 'segment-row';
                sRow.innerHTML = `
                    <div class="segment-main" onclick="toggleDetails(${tIdx},${aIdx})">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span class="counter-badge">${abs.bezeichnung}</span>
                            <span>${abs.stopps.length} Stopps</span>
                        </div>
                        <div><button class="btn-primary" onclick="previewRoute(event,${tIdx},${aIdx})">📍 Karte</button></div>
                    </div>
                    <div class="segment-details" id="det-${tIdx}-${aIdx}">
                        ${abs.stopps.map((s, sIdx) => `<div class="stop-item"><span>${sIdx+1}. ${s.name}</span><button class="btn-danger" style="padding:2px 6px;" onclick="deleteStop(${tIdx},${aIdx},${sIdx})">X</button></div>`).join('')}
                    </div>`;
                div.querySelector(`#segs-${tIdx}`).appendChild(sRow);
            });
            area.appendChild(div);
        });
    }

    function toggleDetails(t, a) { const d = document.getElementById(`det-${t}-${a}`); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }

    async function previewRoute(e, tIdx, aIdx) {
        e.stopPropagation();
        const abs = projectData.touren[tIdx].abschnitte[aIdx];
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('mapModal').style.display = 'block';
        if (!previewMap) { previewMap = L.map('mapContainer').setView([51.2, 6.7], 13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(previewMap); }
        previewMap.eachLayer(l => { if(l instanceof L.Polyline || l instanceof L.Marker) previewMap.removeLayer(l); });
        
        const coords = abs.stopps.map(p => `${p.lng},${p.lat}`).join(';');
        try {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
            const d = await r.json();
            if (d.routes && d.routes[0]) {
                const line = L.geoJSON(d.routes[0].geometry, {style: {color: 'blue', weight: 5}}).addTo(previewMap);
                abs.stopps.forEach(p => L.marker([p.lat, p.lng]).addTo(previewMap).bindPopup(p.name));
                previewMap.fitBounds(line.getBounds());
            }
        } catch(err) { alert("Routing fehlgeschlagen. Internet ok?"); }
    }

    async function prepareAndDownload() {
        const msg = document.getElementById('statusMsg'); msg.innerText = "Berechne finale Navigation...";
        for (let t of projectData.touren) {
            for (let abs of t.abschnitte) {
                const c = abs.stopps.map(p => `${p.lng},${p.lat}`).join(';');
                const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${c}?overview=full&geometries=geojson`);
                const d = await r.json();
                if (d.routes) abs.geometry = d.routes[0].geometry;
            }
        }
        const blob = new Blob([JSON.stringify(projectData)], { type: "application/json" });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "V14_Master_Export.json"; a.click();
        msg.innerText = "Speichern erfolgreich!";
    }

    function closeMap() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('mapModal').style.display = 'none'; }
    function deleteStop(t, a, s) { projectData.touren[t].abschnitte[a].stopps.splice(s, 1); renderEditor(); }
    function deleteTour(t) { if(confirm("Löschen?")) { projectData.touren.splice(t, 1); renderEditor(); } }
    function safeReset() { if(confirm("Reset?")) { projectData = { touren: [] }; renderEditor(); } }
</script>
</body>
</html>
